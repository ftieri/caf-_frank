
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Café Frank — Figure It Out</title>
  <style>
    :root {
      --brand-yellow: #ffd800;
      --bg-dark: #202020;
      --text-light: #f1f1f1;
    }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: var(--bg-dark);
      color: var(--text-light);
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .brand-script {
      font-family: 'Great Vibes', cursive;
      color: var(--brand-yellow);
    }

    /* Fullscreen center */
    .hero-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    .panel {
      max-width: 900px;
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    .headline {
      color: var(--brand-yellow);
      font-weight: 800;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.1;
      letter-spacing: 0.5px;
      margin: .5rem 0 1rem;
    }

    .subhead {
      color: #ffef9e;
      font-size: clamp(1rem, 2.4vw, 1.5rem);
      margin-top: 1rem;
      margin-bottom: 2rem;
    }

    /* Button container replacing Bootstrap’s flex classes */
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
    }

    /* Base button */
    .btn {
      appearance: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 0.85rem 1.5rem;
      font-size: 1.1rem;
      font-weight: 800;
      border: none;
      transition: background-color 0.2s ease, color 0.2s ease, transform .1s;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-brand {
      background-color: var(--brand-yellow);
      color: #000;
    }
    .btn-brand:hover {
      background-color: #ffea70;
    }

    .btn-outline-brand {
      border: 2px solid var(--brand-yellow);
      background: transparent;
      color: var(--brand-yellow);
      font-weight: 700;
    }
    .btn-outline-brand:hover {
      background: #2a2a2a;
    }

    .hint {
      color: #cfcfcf;
      opacity: .85;
      font-size: .95rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

  <main class="hero-wrap">
    <section class="panel">
      <div style="margin-bottom: .75rem;">
        <span class="brand-script" style="font-size: 2rem;">Café Frank</span>
      </div>

      <h1 class="headline">
        FIGURE IT OUT YOURSELF!!! 😡😡😡👿
      </h1>

      <p class="subhead">
        Refresh the page to go back, or use your browser’s back button.
      </p>

      <!-- Button row WITHOUT Bootstrap -->
      <div class="btn-row">
        <button class="btn btn-brand" onclick="window.location.reload();">
          Refresh Page
        </button>

        <button class="btn btn-outline-brand" onclick="history.back();">
          Go Back
        </button>
      </div>

      <p class="hint">
        Tip: If you got here by accident, check the menu links at the top of the site.
      </p>
    </section>
  </main>

</body>
</html>
